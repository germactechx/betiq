<script src="footer.js"></script>
<script>
(function() {
    // =====================================================================
    // UTILITIES
    // =====================================================================
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); window.runUltra && window.runUltra(); }
    });

    const $ = id => document.getElementById(id);
    const fmtPct = p => (p * 100).toFixed(1) + '%';
    const fairOdds = p => p > 0.001 ? (1 / p).toFixed(2) : '—';

    // Expandable toggle
    window.toggleExpand = function(id) {
        const el = document.getElementById(id);
        el.classList.toggle('active');
        const arrow = el.querySelector('.expandable-header div:last-child');
        if (arrow) arrow.textContent = el.classList.contains('active') ? '▴' : '▾';
    };

    // =====================================================================
    // MARGIN STRIP — Shin's method approximation (de-juice probabilities)
    // This is the core expert fix: we NEVER fit xG against raw odds.
    // =====================================================================
    function stripMargin1x2(hO, dO, aO) {
        const r = { h: 1/hO, d: 1/dO, a: 1/aO };
        const sum = r.h + r.d + r.a;
        // Basic proportional normalization (best-practice for 3-way markets)
        return { ph: r.h / sum, pd: r.d / sum, pa: r.a / sum, margin: (sum - 1) * 100 };
    }
    function stripMargin2way(o1, o2) {
        const r1 = 1/o1, r2 = 1/o2;
        const sum = r1 + r2;
        return { p1: r1/sum, p2: r2/sum, margin: (sum - 1) * 100 };
    }

    // =====================================================================
    // POISSON MODEL
    // =====================================================================
    function poisson(lambda, k) {
        if (lambda <= 0) return k === 0 ? 1 : 0;
        let logP = -lambda + k * Math.log(lambda);
        for (let i = 1; i <= k; i++) logP -= Math.log(i);
        return Math.exp(logP);
    }

    function normalizeMatrix(m, max) {
        let total = 0;
        for (let i = 0; i <= max; i++) for (let j = 0; j <= max; j++) total += m[i][j];
        if (total <= 0) return m;
        for (let i = 0; i <= max; i++) for (let j = 0; j <= max; j++) m[i][j] /= total;
        return m;
    }

    function buildMatrix(lh, la, max = 15) {
        const m = [];
        for (let i = 0; i <= max; i++) {
            m[i] = [];
            for (let j = 0; j <= max; j++) m[i][j] = poisson(lh, i) * poisson(la, j);
        }
        return normalizeMatrix(m, max);
    }

    function dcCorrection(i, j, lH, lA, rho) {
        if (i === 0 && j === 0) return 1 - lH * lA * rho;
        if (i === 0 && j === 1) return 1 + lH * rho;
        if (i === 1 && j === 0) return 1 + lA * rho;
        if (i === 1 && j === 1) return 1 - rho;
        return 1;
    }
    function buildMatrixDC(lh, la, max = 15, rho = -0.13) {
        const m = [];
        for (let i = 0; i <= max; i++) {
            m[i] = [];
            for (let j = 0; j <= max; j++) {
                m[i][j] = poisson(lh, i) * poisson(la, j) * dcCorrection(i, j, lh, la, rho);
            }
        }
        for (let i = 0; i <= max; i++) for (let j = 0; j <= max; j++) if (m[i][j] < 0) m[i][j] = 0;
        return normalizeMatrix(m, max);
    }

    function calc1x2(m) {
        let h = 0, d = 0, a = 0;
        m.forEach((row, i) => row.forEach((p, j) => {
            if (i > j) h += p; else if (i === j) d += p; else a += p;
        }));
        return { h, d, a };
    }
    function calcOU(m, line) {
        let o = 0, u = 0;
        m.forEach((row, i) => row.forEach((p, j) => { if (i + j > line) o += p; else u += p; }));
        const total = o + u || 1;
        return { over: o / total, under: u / total };
    }

    // =====================================================================
    // FITTING — FIT FROM MARGIN-STRIPPED ODDS
    // Key expert fix: fit xG against de-juiced probabilities, not raw odds
    // =====================================================================
    function fitFromOdds(hOdds, dOdds, aOdds, ouLine, overOdds, underOdds, ahLine, ahHomeOdds, ahAwayOdds) {
        // STRIP MARGIN FIRST — expert fix #1
        const stripped = stripMargin1x2(hOdds, dOdds, aOdds);
        const pH = stripped.ph, pD = stripped.pd, pA = stripped.pa;

        const hasOU = !isNaN(parseFloat(overOdds)) && !isNaN(parseFloat(underOdds)) && overOdds >= 1.01 && underOdds >= 1.01;
        let pOverTarget = 0.5, pUnderTarget = 0.5;
        if (hasOU) {
            const s = stripMargin2way(overOdds, underOdds);
            pOverTarget = s.p1; pUnderTarget = s.p2;
        }

        const hasAH = ahLine !== undefined && ahLine !== null
                      && !isNaN(parseFloat(ahHomeOdds)) && !isNaN(parseFloat(ahAwayOdds))
                      && ahHomeOdds >= 1.01 && ahAwayOdds >= 1.01;
        let pAHHomeTarget = 0.5, pAHAwayTarget = 0.5;
        if (hasAH) {
            const s = stripMargin2way(ahHomeOdds, ahAwayOdds);
            pAHHomeTarget = s.p1; pAHAwayTarget = s.p2;
        }

        function calcAHCoverSimple(m, line) {
            const threshold = -line;
            let home = 0, away = 0;
            m.forEach((row, i) => row.forEach((p, j) => {
                const diff = i - j;
                if (diff > threshold) home += p; else if (diff < threshold) away += p;
            }));
            const tw = home + away || 1;
            return { home: home/tw, away: away/tw };
        }
        function calcAHCover(m, line) {
            const frac = line % 0.5;
            if (Math.abs(frac) === 0.25) {
                const lo = line - 0.25, hi = line + 0.25;
                const cLo = calcAHCoverSimple(m, lo), cHi = calcAHCoverSimple(m, hi);
                return { home: (cLo.home + cHi.home)/2, away: (cLo.away + cHi.away)/2 };
            }
            return calcAHCoverSimple(m, line);
        }

        // DRAW BIAS CORRECTION — expert fix: bookmakers systemically overprice draws ~5%
        // We adjust target draw probability downward before fitting
        const drawCorrected = pD * 0.95; // book draw is ~5% inflated
        const drawNorm = pH + drawCorrected + pA;
        const adjPH = pH / drawNorm, adjPD = drawCorrected / drawNorm, adjPA = pA / drawNorm;

        function calcErr(lH, lA) {
            const m = buildMatrix(lH, lA);
            const x = calc1x2(m);
            // Fit to draw-corrected probabilities
            const e1x2 = ((x.h - adjPH)**2 + (x.d - adjPD)**2 + (x.a - adjPA)**2) / 3;
            let eOU = 0;
            if (hasOU) {
                const ou = calcOU(m, ouLine);
                eOU = ((ou.over - pOverTarget)**2 + (ou.under - pUnderTarget)**2) / 2;
            }
            let eAH = 0;
            if (hasAH) {
                const ah = calcAHCover(m, ahLine);
                eAH = (ah.home - pAHHomeTarget)**2;
            }
            return (2.0 * e1x2 + 1.5 * eOU + 0.5 * eAH) / (2.0 + (hasOU ? 1.5 : 0) + (hasAH ? 0.5 : 0));
        }

        // Two-pass grid search
        let best = { lH: 1.4, lA: 1.1 }, bestErr = Infinity;
        for (let lH = 0.10; lH <= 4.0; lH += 0.05) {
            for (let lA = 0.10; lA <= 4.0; lA += 0.05) {
                const e = calcErr(lH, lA);
                if (e < bestErr) { bestErr = e; best = { lH, lA }; }
            }
        }
        const fine = 0.12, step = 0.005;
        for (let lH = best.lH - fine; lH <= best.lH + fine; lH += step) {
            for (let lA = best.lA - fine; lA <= best.lA + fine; lA += step) {
                if (lH < 0.05 || lA < 0.05) continue;
                const e = calcErr(lH, lA);
                if (e < bestErr) { bestErr = e; best = { lH: +lH.toFixed(4), lA: +lA.toFixed(4) }; }
            }
        }
        best._fitErr = bestErr;
        return best;
    }

    // FIT FROM STATS — with home advantage correction
    function fitFromStats() {
        const hAtk = parseFloat($('homeAttack').value);
        const hDef = parseFloat($('homeDefense').value);
        const aAtk = parseFloat($('awayAttack').value);
        const aDef = parseFloat($('awayDefense').value);
        if ([hAtk, hDef, aAtk, aDef].some(isNaN)) return null;
        const homeAdv = parseFloat($('homeAdvBoost').value) || 0.30;
        let lH = Math.max(0.1, Math.min(6, hAtk * aDef + homeAdv)); // expert fix: add home advantage
        let lA = Math.max(0.1, Math.min(6, aAtk * hDef));
        return { lH, lA };
    }

    // =====================================================================
    // CROSS-MARKET CONSISTENCY CHECK — expert exploit detector
    // Compares xG implied by 1X2 vs xG implied by O/U line
    // A gap > 0.18 goals = different trading desks, possible soft edge
    // =====================================================================
    function crossMarketCheck(finalLH, finalLA, ouLine, overOdds, underOdds) {
        if (!overOdds || !underOdds || isNaN(overOdds) || isNaN(underOdds)) return null;
        const stripped = stripMargin2way(overOdds, underOdds);
        const pOver = stripped.p1;

        // Estimate xG total from O/U line: find total xG where P(over line) ≈ pOver
        // Use simple bisection on total xG (assuming equal split as first pass)
        const modelTotal = finalLH + finalLA;

        // Quick estimate: using Poisson CDF inversion approximation
        // P(total > ouLine | total xG = T) = 1 - sum(poisson_joint up to ouLine)
        function pOverFromTotal(T) {
            const splitH = T * (finalLH / (modelTotal || 1));
            const splitA = T * (finalLA / (modelTotal || 1));
            const mat = buildMatrix(splitH, splitA, 12);
            return calcOU(mat, ouLine).over;
        }

        // Binary search for T where pOverFromTotal(T) ≈ pOver
        let lo = 0.2, hi = 8.0;
        for (let i = 0; i < 30; i++) {
            const mid = (lo + hi) / 2;
            if (pOverFromTotal(mid) < pOver) lo = mid; else hi = mid;
        }
        const ouImpliedTotal = (lo + hi) / 2;
        const gap = Math.abs(modelTotal - ouImpliedTotal);
        return { modelTotal: modelTotal.toFixed(2), ouImpliedTotal: ouImpliedTotal.toFixed(2), gap: gap.toFixed(2), flagged: gap > 0.18 };
    }

    // =====================================================================
    // EDGE SIGNAL
    // =====================================================================
    function edgeSignal(modelProb, bookOdds) {
        if (!bookOdds || isNaN(bookOdds) || bookOdds < 1.01) return '';
        const impliedProb = 1 / bookOdds;
        const edge = modelProb - impliedProb;
        const ev = modelProb * bookOdds - 1;
        if (edge > 0.04) return `<span class="edge-signal value">▲ Value +${(edge*100).toFixed(1)}% EV:+${(ev*100).toFixed(1)}%</span>`;
        else if (edge < -0.04) return `<span class="edge-signal overpriced">▼ Overpriced ${(edge*100).toFixed(1)}%</span>`;
        else return `<span class="edge-signal fair">≈ Fair</span>`;
    }

    // =====================================================================
    // KELLY CRITERION
    // =====================================================================
    function kellyCriterion(prob, odds) {
        if (!odds || isNaN(odds) || odds < 1.01) return null;
        const b = odds - 1, q = 1 - prob;
        return Math.max(0, (b * prob - q) / b);
    }



    // =====================================================================
    // QUARTER-BALL AH EV HIGHLIGHT
    // expert exploit: quarter-ball lines are rarely individually priced by books
    // =====================================================================
    function quarterBallEV(mat, ahLine, ahHomeO, ahAwayO, MAX) {
        if (Math.abs((ahLine % 0.5)) !== 0.25) return null;
        const lo = ahLine - 0.25, hi = ahLine + 0.25;
        function coverSimple(m, line) {
            const threshold = -line;
            let home = 0, away = 0;
            for (let i = 0; i <= MAX; i++) for (let j = 0; j <= MAX; j++) {
                const diff = i - j, p = m[i][j];
                if (diff > threshold) home += p; else if (diff < threshold) away += p;
            }
            const tw = home + away || 1;
            return { home: home/tw, away: away/tw };
        }
        const cLo = coverSimple(mat, lo), cHi = coverSimple(mat, hi);
        const modelHomeProb = (cLo.home + cHi.home) / 2;
        const modelAwayProb = (cLo.away + cHi.away) / 2;
        if (!ahHomeO || !ahAwayO || isNaN(ahHomeO) || isNaN(ahAwayO)) return null;
        const s = stripMargin2way(ahHomeO, ahAwayO);
        const homeEdge = modelHomeProb - s.p1;
        const awayEdge = modelAwayProb - s.p2;
        return { modelHomeProb, modelAwayProb, impliedHome: s.p1, impliedAway: s.p2, homeEdge, awayEdge };
    }


    // =====================================================================
    // CONFIDENCE LEVEL
    // =====================================================================
    function confidenceLevel(numSources) {
        if (numSources >= 3) return { label: 'HIGH', color: 'var(--win)', bg: 'rgba(0,229,160,0.10)', border: 'rgba(0,229,160,0.3)' };
        if (numSources === 2) return { label: 'MEDIUM', color: 'var(--draw)', bg: 'rgba(245,200,66,0.10)', border: 'rgba(245,200,66,0.3)' };
        return { label: 'LOW', color: 'var(--muted2)', bg: 'rgba(107,116,148,0.10)', border: 'rgba(107,116,148,0.3)' };
    }

    // =====================================================================
    // MARGIN / SHARP MONEY DISPLAY (live, on input)
    // =====================================================================
    function calcMargin() {
        const h = parseFloat($('oddsHome').value), d = parseFloat($('oddsDraw').value), a = parseFloat($('oddsAway').value);
        const el = $('marginDisplay');
        if (isNaN(h) || isNaN(d) || isNaN(a) || h < 1.01 || d < 1.01 || a < 1.01) { el.style.display = 'none'; return; }
        const margin = ((1/h + 1/d + 1/a) - 1) * 100;
        const pct = margin.toFixed(2);
        const cls = margin <= 3 ? 'good' : margin <= 6 ? 'ok' : 'bad';
        const desc = margin <= 3 ? 'Sharp — reliable for fitting' : margin <= 6 ? 'Average' : 'High vig — treat with caution';
        const barWidth = Math.min(100, (margin / 15) * 100).toFixed(1);
        const barColor = margin <= 3 ? 'var(--win)' : margin <= 6 ? 'var(--draw)' : 'var(--lose)';
        el.style.display = 'block';
        el.innerHTML = `<div class="margin-bar"><span class="margin-label">Book Margin</span><span class="margin-value ${cls}">${pct}%</span><div class="margin-track"><div class="margin-fill" style="width:${barWidth}%;background:${barColor}"></div></div><span class="margin-desc">${desc}</span></div>`;
    }
    ['oddsHome','oddsDraw','oddsAway'].forEach(id => $( id).addEventListener('input', calcMargin));

    function calcAHMargin() {
        const h = parseFloat($('oddsAHHome').value), a = parseFloat($('oddsAHAway').value);
        const el = $('ahMarginDisplay');
        if (isNaN(h) || isNaN(a) || h < 1.01 || a < 1.01) { el.style.display = 'none'; return; }
        const margin = ((1/h + 1/a) - 1) * 100;
        const pct = margin.toFixed(2);
        const cls = margin <= 2.5 ? 'good' : margin <= 5 ? 'ok' : 'bad';
        const desc = margin <= 2.5 ? 'Sharp AH' : margin <= 5 ? 'Average' : 'High vig';
        const barW = Math.min(100, (margin / 12) * 100).toFixed(1);

    function runOfflineProAnalysis(snap, mat) {
        const MAX2 = 15;
        const fp = p => (p * 100).toFixed(1) + '%';
        const fo = p => p > 0.001 ? (1 / p).toFixed(2) : '—';

        function ouProb(line) {
            let o = 0, u = 0;
            for (let i = 0; i <= MAX2; i++) for (let j = 0; j <= MAX2; j++) {
                if (i + j > line) o += mat[i][j]; else u += mat[i][j];
            }
            const t = o + u || 1;
            return { over: o/t, under: u/t };
        }
        function ahProb(line) {
            const threshold = -line; let home = 0, away = 0;
            for (let i = 0; i <= MAX2; i++) for (let j = 0; j <= MAX2; j++) {
                const diff = i-j, p = mat[i][j];
                if (diff > threshold) home += p; else if (diff < threshold) away += p;
            }
            return { home, away };
        }
        function evEdge(prob, bookOdds) {
            if (!bookOdds || isNaN(bookOdds) || bookOdds < 1.01) return { ev: null, edge: null, implied: null };
            const implied = 1/bookOdds;
            return { ev: prob * bookOdds - 1, edge: prob - implied, implied };
        }
        function confScore(prob, ev, edge) {
            let score = 50;
            if (prob >= 0.70) score += 20; else if (prob >= 0.58) score += 12; else if (prob >= 0.48) score += 5;
            if (edge !== null) { if (edge >= 0.12) score += 20; else if (edge >= 0.07) score += 12; else if (edge >= 0.04) score += 6; else if (edge < 0) score -= 15; }
            else if (prob >= 0.65) score += 10;
            if (ev !== null) { if (ev >= 0.15) score += 10; else if (ev >= 0.08) score += 5; else if (ev < 0) score -= 10; }
            return Math.min(97, Math.max(30, Math.round(score)));
        }

        const hO = snap.hOdds, dO = snap.dOdds, aO = snap.aOdds;
        const candidates = [];
        const totalXG = snap.finalLH + snap.finalLA;

        [{ market:'Home Win', prob:snap.prbs.h, bookOdds:hO },
         { market:'Draw', prob:snap.prbs.d, bookOdds:dO },
         { market:'Away Win', prob:snap.prbs.a, bookOdds:aO }].forEach(o => {
            const { ev, edge, implied } = evEdge(o.prob, o.bookOdds);
            const conf = confScore(o.prob, ev, edge);
            const fairO = o.prob > 0 ? (1/o.prob).toFixed(2) : '—';
            const drawNote = o.market === 'Draw' ? ' Note: draw prices carry ~5% systematic bookmaker inflation; edge adjusted for draw bias.' : '';
            const crossNote = snap.crossCheck && snap.crossCheck.flagged ? ` Cross-market inconsistency detected (${snap.crossCheck.gap} goal gap) — exercise caution on total goals markets.` : '';
            const killer = o.market === 'Draw'
                ? 'A goal in the first 10 minutes heavily disrupts draw probability, making this bet unusually sensitive to fast starts.'
                : o.market === 'Home Win'
                ? 'Away team scoring first dramatically reduces this probability; early red card or injury to home key player would void the edge.'
                : 'Home team establishing early control or away team key player absent through injury would significantly reduce expected value.';
            const reasoning = `Model assigns ${fp(o.prob)} probability vs book-implied (de-juiced) ${implied ? fp(implied) : '—'}. Home xG ${snap.finalLH.toFixed(2)} vs Away xG ${snap.finalLA.toFixed(2)}. EV ${ev !== null ? (ev >= 0 ? '+' : '') + (ev*100).toFixed(1) + '%' : '—'}.${drawNote}${crossNote}`;
            candidates.push({ market:o.market, category:'1X2', prob:o.prob, bookOdds:o.bookOdds, fairOdds:fairO, ev, edge, implied, conf, reasoning, killer });
        });

        [1.5,2.5,3.5].forEach(line => {
            const { over, under } = ouProb(line);
            [{ market:`Over ${line} Goals`, prob:over, side:'over' },
             { market:`Under ${line} Goals`, prob:under, side:'under' }].forEach(o => {
                const mainLine = parseFloat(document.getElementById('ouLine').value) || 2.5;
                const isMainLine = Math.abs(line - mainLine) < 0.01;
                const ovO = isMainLine && o.side === 'over' ? parseFloat(document.getElementById('oddsOver').value) : null;
                const unO = isMainLine && o.side === 'under' ? parseFloat(document.getElementById('oddsUnder').value) : null;
                const lineBookOdds = o.side === 'over' ? ovO : unO;
                const { ev, edge, implied } = evEdge(o.prob, lineBookOdds);
                const conf = confScore(o.prob, ev, edge);
                const fairO = (1/o.prob).toFixed(2);
                const crossNote = snap.crossCheck && snap.crossCheck.flagged ? ` Cross-market gap of ${snap.crossCheck.gap} goals — 1X2 and O/U models disagree, boosting this edge opportunity.` : '';
                const killer = `A match with multiple stoppages, VAR reviews, or injury time can shift total goals; weather (heavy rain, wind) that wasn't priced in would reduce scoring.`;
                const reasoning = `Combined xG ${totalXG.toFixed(2)} → ${fp(o.prob)} for ${o.market}. Fair odds ${fairO}. ${edge !== null ? 'Edge vs de-juiced: '+(edge >= 0?'+':'')+(edge*100).toFixed(1)+'%. EV: '+(ev >= 0?'+':'')+(ev*100).toFixed(1)+'%.' : ''}${crossNote}`;
                candidates.push({ market:o.market, category:'OVER/UNDER', prob:o.prob, bookOdds:lineBookOdds, fairOdds:fairO, ev, edge, implied, conf, reasoning, killer });
            });
        });

        // Quarter-ball special candidate
        if (snap.qbEV) {
            const qb = snap.qbEV;
            const bestSide = Math.abs(qb.homeEdge) > Math.abs(qb.awayEdge) ? 'Home' : 'Away';
            const bestEdge = bestSide === 'Home' ? qb.homeEdge : qb.awayEdge;
            if (Math.abs(bestEdge) >= 0.04) {
                const ahLine = snap.ahLine;
                const label = ahLine >= 0 ? `+${ahLine}` : `${ahLine}`;
                candidates.push({
                    market: `AH ${label} ${bestSide} (Quarter-ball)`,
                    category: 'ASIAN HANDICAP',
                    prob: bestSide === 'Home' ? qb.modelHomeProb : qb.modelAwayProb,
                    bookOdds: bestSide === 'Home' ? snap.ahHomeO : snap.ahAwayO,
                    fairOdds: (1/(bestSide === 'Home' ? qb.modelHomeProb : qb.modelAwayProb)).toFixed(2),
                    ev: (bestSide === 'Home' ? qb.modelHomeProb : qb.modelAwayProb) * (bestSide === 'Home' ? snap.ahHomeO : snap.ahAwayO) - 1,
                    edge: bestEdge,
                    implied: bestSide === 'Home' ? qb.impliedHome : qb.impliedAway,
                    conf: Math.min(85, 55 + Math.abs(bestEdge) * 200),
                    reasoning: `Quarter-ball structural exploit: books average adjacent half-ball lines rather than pricing individually. Model shows ${fp(bestSide === 'Home' ? qb.modelHomeProb : qb.modelAwayProb)} vs book-implied (de-juiced) ${fp(bestSide === 'Home' ? qb.impliedHome : qb.impliedAway)}. Edge ${(bestEdge*100).toFixed(1)}%.`,
                    killer: 'A draw at the relevant scoreline triggers a push on half the stake — ensure bankroll accounts for partial refund scenarios.'
                });
            }
        }

        function candidateScore(c) {
            let s = 0;
            const fo2 = parseFloat(c.fairOdds);
            if (!isNaN(fo2)) { if (fo2 >= 1.5 && fo2 <= 5.0) s += 30; else if (fo2 < 1.5) s -= 20; else if (fo2 > 5.0) s -= 10; }
            s += c.conf * 0.4;
            if (c.ev !== null && c.ev > 0) s += c.ev * 100;
            if (c.edge !== null && c.edge > 0) s += c.edge * 60;
            if (c.prob >= 0.60) s += 15; else if (c.prob >= 0.50) s += 8;
            if (c.prob >= 0.88) s -= 25;
            // Boost quarter-ball AH candidates (structural exploit)
            if (c.category === 'ASIAN HANDICAP' && c.market.includes('Quarter')) s += 20;
            return s;
        }

        const scored = candidates.map(c => ({ ...c, _score: candidateScore(c) })).sort((a,b) => b._score - a._score);
        const picks = [], usedCats = new Set();
        for (const c of scored) { if (picks.length >= 3) break; if (!usedCats.has(c.category)) { picks.push(c); usedCats.add(c.category); } }
        if (picks.length < 3) for (const c of scored) { if (picks.length >= 3) break; if (!picks.includes(c)) picks.push(c); }

        const dominant = snap.prbs.h > snap.prbs.a ? 'home' : 'away';
        const goalExpect = totalXG >= 3.0 ? 'high-scoring' : totalXG >= 2.0 ? 'moderate-scoring' : 'low-scoring';
        const crossSummary = snap.crossCheck && snap.crossCheck.flagged
            ? ` Cross-market discrepancy of ${snap.crossCheck.gap} goals between 1X2 and O/U pricing suggests soft lines exist.`
            : '';
        const summary = `Margin-stripped model projects a ${goalExpect} match: ${snap.finalLH.toFixed(2)} home xG vs ${snap.finalLA.toFixed(2)} away xG. The ${dominant} team holds a statistical advantage.${crossSummary} Picks are ranked by edge over de-juiced probabilities, cross-market consistency, and Kelly-weighted expected value.`;

        return {
            summary, mode: 'offline',
            picks: picks.slice(0,3).map((c, idx) => ({
                rank: idx+1, market: c.market, category: c.category,
                recommendedOdds: c.fairOdds,
                modelProb: fp(c.prob),
                impliedProb: c.implied !== null ? fp(c.implied) : '—',
                edge: c.edge !== null ? (c.edge >= 0?'+':'') + (c.edge*100).toFixed(1) + '%' : '—',
                ev: c.ev !== null ? (c.ev >= 0?'+':'') + (c.ev*100).toFixed(1) + '%' : '—',
                confidence: c.conf, reasoning: c.reasoning,
                killer: c.killer || null
            }))
        };
    }

                })
            });
            if (!response.ok) throw new Error(`API ${response.status}`);
            const data = await response.json();
            const raw = data.content.map(c => c.text || '').join('');
            const clean = raw.replace(/```json|```/g,'').trim();
            const result = JSON.parse(clean);
            result.mode = 'online';
            renderProPicks(result, body);
        } catch(err) {
            console.warn('API call failed, falling back to offline engine:', err.message);
            try {
                const result = runOfflineProAnalysis(snap, mat);
                result.summary = '⚠️ AI unreachable — showing expert offline analysis. ' + result.summary;
                renderProPicks(result, body);
            } catch(err2) {
                body.innerHTML = `<div class="pro-error">⚠️ Analysis failed: ${err.message}<br><br>
                    <button onclick="runProAnalysis()" style="margin-top:8px;font-size:12px;color:var(--muted2);background:var(--surface2);border:1px solid var(--border);padding:6px 14px;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif">Retry</button></div>`;
            }
        }
    };

})();
</script>
<script src="header.js"></script>
<script src="back-to-top.js"></script>
</body>
</html>
